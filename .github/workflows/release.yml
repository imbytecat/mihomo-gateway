name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (e.g., v1.0.0)"
        required: false
        type: string

env:
  ARTIFACT_NAME: mihomo-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build VM image
        run: nix build .#image

      - name: Prepare artifact
        id: artifact
        run: |
          IMAGE=$(find -L ./result -name "*.qcow2" -type f)
          FILENAME=$(basename "$IMAGE")
          SIZE=$(du -h "$IMAGE" | cut -f1)
          SHA256=$(sha256sum "$IMAGE" | awk '{print $1}')

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Generate release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            TAG="${{ inputs.tag_name }}"
          else
            TAG="v$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            | 字段 | 值 |
            |------|-----|
            | Commit | `${{ github.sha }}` |
            | Size | ${{ steps.artifact.outputs.size }} |
            | SHA256 | `${{ steps.artifact.outputs.sha256 }}` |
          draft: false
          prerelease: false
          files: ${{ steps.artifact.outputs.image }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
